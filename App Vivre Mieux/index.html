
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: https://images.unsplash.com; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Vivre Mieux - Ton Arbitre de Poche</title>
    <style>
        /* DESIGN GLOBAL */
        body {
            background-color: #E0F7FA;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #01579B;
        }

        .header { text-align: center; margin-bottom: 20px; }
        
        /* ZONE COFFRE AVEC ROUAGE À GAUCHE */
        .coffre {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 95%;
            max-width: 400px;
            text-align: center;
            margin-bottom: 20px;
            position: relative; /* Pour placer le rouage par rapport à ce cadre */
        }

        .btn-param-coffre {
            position: absolute;
            top: 10px;
            left: 10px; /* ROUAGE EN HAUT À GAUCHE */
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }

        .pouce { font-size: 45px; margin-bottom: 5px; }

        /* ZONE DE SAISIE */
        .saisie-zone {
            background: #B3E5FC;
            padding: 20px;
            border-radius: 20px;
            width: 95%;
            max-width: 400px;
            box-sizing: border-box;
        }

        .btn-edit-budget {
            background: #0277BD;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 15px;
            cursor: pointer;
            width: 100%;
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #81D4FA;
            font-size: 18px;
            margin-top: 10px;
            box-sizing: border-box;
        }

        .btn-principal {
            background-color: #0288D1;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* ECRAN VERDICT */
        #verdict-screen {
            display: none;
            text-align: center;
            width: 95%;
            max-width: 400px;
        }

        .photo-reve {
            width: 100%;
            border-radius: 15px;
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>☀️ Vivre Mieux</h1>
        <p>Prends le contrôle avec le sourire !</p>
    </div>

    <div class="coffre">
        <button onclick="modifierCoffre()" class="btn-param-coffre" title="Modifier l'objectif">⚙️</button>
        <div class="pouce">👍</div>
        <strong id="titre-coffre">Ton Coffre est plein</strong>
        <p id="msg-coffre" style="font-size: 12px; color: #546E7A;">Toutes tes factures sont payées.</p>
    </div>

    <div class="saisie-zone" id="saisie-form">
        <p id="label-budget" style="font-weight: bold; margin-bottom: 5px;">Chargement du budget...</p>
        <button onclick="modifierBudget()" class="btn-edit-budget">✏️ Modifier mon budget semaine</button>
        
        <label style="display:block; margin-top: 10px;">Combien veux-tu dépenser ?</label>
        <input type="number" id="montant" placeholder="Ex: 45 €">
        <button class="btn-principal" onclick="donnerVerdict()">JE CRAQUE OU PAS ?</button>
    </div>

    <div id="verdict-screen">
        <h2 id="verdict-titre"></h2>
        <p id="verdict-msg"></p>
        
        <p style="margin-top: 20px;"><strong>Rappelle-toi ton rêve :</strong></p>
        <input type="file" id="imageInput" accept="image/*" style="display:none;" onchange="loadPhoto(event)">
        <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=500" id="photoAffiche" class="photo-reve" onclick="document.getElementById('imageInput').click()" title="Clique pour changer l'image">
        
        <div id="zone-pub" style="margin: 20px 0; padding: 15px; background: white; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);"></div>

        <button onclick="confirmerAchat()" style="background:#2E7D32; color:white; border:none; padding:15px; width:100%; border-radius:10px; font-weight:bold; cursor:pointer;">J'AI ACHETÉ ! ✅</button>
        
        <button onclick="location.reload()" style="background:#546E7A; color:white; border:none; padding:10px; width:100%; border-radius:10px; margin-top:10px; cursor:pointer;">RETOUR / ANNULER</button>
    </div>

<script>
// VARIABLES GLOBALES
window.budgetSemaine = 0;

// CHARGEMENT INITIAL
window.onload = function() {
    const budgetSauvegarde = localStorage.getItem('budgetHebdo');
    const texteCoffre = localStorage.getItem('texteCoffre');
    const photoSauvegardee = localStorage.getItem('maPhotoReve');

    const budgetParse = parseFloat(budgetSauvegarde);
    if (budgetSauvegarde !== null && !isNaN(budgetParse) && isFinite(budgetParse)) {
        window.budgetSemaine = budgetParse;
        actualiserAffichage();
    } else {
        modifierBudget();
    }

    if (texteCoffre) {
        // innerText sets the value as text, which is safe from HTML/script injection.
        document.getElementById('titre-coffre').innerText = texteCoffre.slice(0, 120);
    }

    // Only restore the photo if the stored value is a safe image data URL.
    // This prevents a hypothetically poisoned localStorage value from loading
    // an arbitrary remote/javascript: URL through the <img src>.
    if (photoSauvegardee && /^data:image\/(png|jpeg|jpg|gif|webp|bmp|svg\+xml);base64,/i.test(photoSauvegardee)) {
        document.getElementById('photoAffiche').src = photoSauvegardee;
    } else if (photoSauvegardee) {
        // Drop any unexpected value rather than trusting it.
        localStorage.removeItem('maPhotoReve');
    }
}

// FONCTION : CHANGER LE BUDGET
function modifierBudget() {
    const nouveau = prompt("Quel est ton budget total pour cette semaine ? (en €)", window.budgetSemaine || "100");
    if (nouveau === null || nouveau === "") {
        return;
    }
    const valeur = parseFloat(nouveau);
    if (isNaN(valeur) || !isFinite(valeur) || valeur < 0 || valeur > 1e9) {
        alert("Veuillez entrer un budget valide (nombre positif).");
        return;
    }
    localStorage.setItem('budgetHebdo', String(valeur));
    window.budgetSemaine = valeur;
    actualiserAffichage();
}

// FONCTION : CHANGER LE TEXTE DU COFFRE
function modifierCoffre() {
    const nouveauTexte = prompt("Quel est ton objectif actuel ?", document.getElementById('titre-coffre').innerText);
    if (nouveauTexte === null || nouveauTexte === "") {
        return;
    }
    // Enforce a reasonable length to avoid abusing localStorage as a dumping ground.
    const texteBorne = nouveauTexte.slice(0, 120);
    localStorage.setItem('texteCoffre', texteBorne);
    // innerText (not innerHTML) keeps this safe from HTML/script injection.
    document.getElementById('titre-coffre').innerText = texteBorne;
}

function actualiserAffichage() {
    document.getElementById('label-budget').innerText = "Budget restant : " + window.budgetSemaine + " €";
}

// FONCTION : LE VERDICT
function donnerVerdict() {
    const montant = parseFloat(document.getElementById('montant').value);
    if(isNaN(montant) || montant <= 0) {
        alert("Veuillez entrer un montant valide.");
        return;
    }

    document.getElementById('saisie-form').style.display = 'none';
    document.getElementById('verdict-screen').style.display = 'block';

    const titre = document.getElementById('verdict-titre');
    const msg = document.getElementById('verdict-msg');
    const zonePub = document.getElementById('zone-pub');

    if (montant <= window.budgetSemaine * 0.15) {
        titre.innerText = "C'est validé ! ✅";
        titre.style.color = "#2E7D32";
        msg.innerText = "C'est une petite dépense raisonnable.";
    } else if (montant <= window.budgetSemaine) {
        titre.innerText = "Attention... 🤔";
        titre.style.color = "#F57C00";
        msg.innerText = "C'est une grosse partie de ton budget. Ton rêve en vaut-il la peine ?";
    } else {
        titre.innerText = "STOP ! 🛑";
        titre.style.color = "#C62828";
        msg.innerText = "Tu n'as pas assez de budget pour ça cette semaine.";
    }

    // GESTION PUB AMAZON (Remplacer les liens par les tiens)
    if (montant < 50) {
        zonePub.innerHTML = `
            <div style="text-align: left; border-left: 4px solid #FF9900; padding-left: 10px;">
                <span style="color: #FF9900; font-weight: bold; font-size: 11px;">CONSEIL VIVRE MIEUX</span><br>
                <p style="font-size: 13px; margin: 5px 0;">Apprends à économiser sans effort :</p>
                <a href="https://amzn.to/4tkbD6y" target="_blank" rel="noopener noreferrer nofollow sponsored" style="color: #0277BD; font-weight: bold; text-decoration: none; font-size: 14px;">
                    Découvrir ce guide budget sur Amazon →
                </a>
            </div>`;
    } else {
        zonePub.innerHTML = `<p style="font-size: 13px; color: #546E7A; margin:0;">Chaque euro économisé te rapproche de ton objectif !</p>`;
    }
}

// FONCTION : PHOTO PERSONNALISÉE
function loadPhoto(event) {
    const output = document.getElementById('photoAffiche');
    const file = event.target.files && event.target.files[0];
    if (!file) {
        return;
    }
    // The accept="image/*" attribute is client-side only and bypassable, so
    // re-validate the MIME type and size here. Reject SVG because it can
    // contain inline <script> and be abused for XSS when rendered.
    const ALLOWED_TYPES = ['image/png', 'image/jpeg', 'image/gif', 'image/webp', 'image/bmp'];
    const MAX_BYTES = 2 * 1024 * 1024; // 2 MB keeps us well under the localStorage quota.
    if (!ALLOWED_TYPES.includes(file.type)) {
        alert("Format d'image non supporté. Utilise PNG, JPEG, GIF, WebP ou BMP.");
        event.target.value = '';
        return;
    }
    if (file.size > MAX_BYTES) {
        alert("Image trop volumineuse (max 2 Mo).");
        event.target.value = '';
        return;
    }
    const reader = new FileReader();
    reader.onload = function(){
        const result = reader.result;
        if (typeof result !== 'string' || !/^data:image\/(png|jpeg|jpg|gif|webp|bmp);base64,/i.test(result)) {
            return;
        }
        output.src = result;
        try {
            localStorage.setItem('maPhotoReve', result);
        } catch (e) {
            // localStorage quota exceeded - keep the in-memory preview but warn the user.
            alert("Impossible de sauvegarder l'image (espace insuffisant).");
        }
    };
    reader.readAsDataURL(file);
}

// FONCTION : VALIDER L'ACHAT
function confirmerAchat() {
    const montant = parseFloat(document.getElementById('montant').value);
    if (isNaN(montant) || !isFinite(montant) || montant <= 0) {
        alert("Montant invalide.");
        return;
    }
    window.budgetSemaine -= montant;
    localStorage.setItem('budgetHebdo', String(window.budgetSemaine));
    alert("Achat validé ! Nouveau budget : " + window.budgetSemaine.toFixed(2) + " €");
    location.reload();
}
</script>

</body>
</html>
